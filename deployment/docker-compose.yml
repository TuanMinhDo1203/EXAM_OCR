services:
  backend:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${YOLO_MODEL_PATH_HOST:-../YOLO}:/models/yolo:ro
      - ${RESNET_MODEL_PATH_HOST:-../Resnet}:/models/resnet:ro
      - ${TROCR_MODEL_PATH_HOST:-../trocr_handwritten_decoder_only_best_S1}:/models/trocr:ro
      - backend_runtime:/app/backend/runtime
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_USE_MOCKS: "false"
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.backend
    env_file:
      - .env
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info", "--pool=solo", "-c", "1"]
    volumes:
      - ${YOLO_MODEL_PATH_HOST:-../YOLO}:/models/yolo:ro
      - ${RESNET_MODEL_PATH_HOST:-../Resnet}:/models/resnet:ro
      - ${TROCR_MODEL_PATH_HOST:-../trocr_handwritten_decoder_only_best_S1}:/models/trocr:ro
      - backend_runtime:/app/backend/runtime
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8081}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  backend_runtime:
